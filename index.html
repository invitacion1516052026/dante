<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Especial</title>

<style>
  /* BOTÓN WHATSAPP */

.whatsapp-btn{

  display:inline-block;

  margin-top:20px;

  padding:12px 22px;

  border-radius:30px;

  background:#25D366;

  color:white;

  text-decoration:none;

  font-weight:bold;

  box-shadow:
    0 0 10px rgba(37,211,102,0.7),
    0 0 20px rgba(37,211,102,0.5);

  transition:0.3s;
}

.whatsapp-btn:hover{

  transform:scale(1.08);

  box-shadow:
    0 0 20px rgba(37,211,102,1),
    0 0 40px rgba(37,211,102,0.8);

}
/* FECHA EVENTO */

.event-date{

  margin-top:10px;
  margin-bottom:15px;

  font-size:1.3em;
  font-weight:bold;

  color:#fff;

  text-shadow:
    0 0 10px #0ff,
    0 0 20px #f0f;

  animation:pulse 2s infinite;
}

/* EFECTO */

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.05);
  }

  100%{
    transform:scale(1);
  }

}
  
  /* BOTÓN MUSICA */

.music-btn{

  position:fixed;

  top:20px;
  right:20px;

  padding:10px 18px;

  border:none;
  border-radius:30px;

  background:rgba(0,0,0,0.6);

  color:white;

  font-size:1em;

  cursor:pointer;

  backdrop-filter: blur(5px);

  box-shadow:
    0 0 10px #0ff,
    0 0 20px #0ff;

  transition:0.3s;
}

.music-btn:hover{

  transform:scale(1.05);

  background:#0ff;
  color:black;

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
    url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;
  overflow:hidden;
  text-align:center;
}

/* Partículas/fondo */

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:url('https://www.transparenttextures.com/patterns/stardust.png');

  opacity:0.3;
  z-index:-1;
}

/* CONTENEDOR */

.container{
  width:90%;
  max-width:450px;

  padding:30px;

  border-radius:25px;

  backdrop-filter: blur(8px);

  background:rgba(0,0,0,0.35);

  box-shadow:
    0 0 20px rgba(255,255,255,0.2),
    0 0 40px rgba(0,255,255,0.15);
}

/* TITULO */

h1{
  font-size:3em;
  margin-bottom:10px;

  text-shadow:
    0 0 10px #fff,
    0 0 20px #00f,
    0 0 40px #0ff;
}

/* TEXTO */

p{
  font-size:1.2em;
}

/* UBICACIÓN */

.location{
  margin-top:15px;
  font-size:1.1em;
  text-shadow:0 0 10px #0ff;
}

/* BOTÓN */

.map-btn{
  display:inline-block;

  margin-top:15px;
  padding:10px 18px;

  border:2px solid #0ff;
  border-radius:25px;

  color:white;
  text-decoration:none;

  transition:0.3s;
}

.map-btn:hover{
  background:#0ff;
  color:black;

  box-shadow:0 0 20px #0ff;
}

/* IMAGEN */

.center-img{
  width:260px;
  max-width:85%;

  margin:25px 0;

  border-radius:20px;

  box-shadow:
    0 0 20px rgba(255,255,255,0.4),
    0 0 40px rgba(0,255,255,0.3);

  transition:0.4s;
}

.center-img:hover{
  transform:scale(1.05);
}

/* CONTADOR */

.countdown{
  font-size:2em;
  margin-top:10px;

  font-weight:bold;

  text-shadow:
    0 0 10px #fff,
    0 0 20px #f0f;

  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{
    text-shadow:
      0 0 10px #fff,
      0 0 20px #0ff;
  }

  to{
    text-shadow:
      0 0 20px #fff,
      0 0 40px #f0f;
  }
}

/* TEXTO MOVIMIENTO */

.moonwalk{
  position:absolute;
  bottom:20px;

  width:100%;

  font-size:1.5em;

  animation:move 8s linear infinite;
}

@keyframes move{
  0%{
    transform:translateX(100%);
  }

  100%{
    transform:translateX(-100%);
  }
}

/* RESPONSIVE */

@media(max-width:600px){

  h1{
    font-size:2.2em;
  }

  .countdown{
    font-size:1.5em;
  }

  .moonwalk{
    font-size:1.2em;
  }

}

</style>
</head>

<body>

<div class="container">

  <h1>✨ Estás Invitado ✨</h1>

  <p>Cumpleaños Dante</p>

  <!-- UBICACIÓN -->

  <p class="location">
    📍 Tercer Tiempo Kids - Viedma
  </p>

  <a
    href="https://www.google.com/maps/place/Tercer+Tiempo+Kids/"
    target="_blank"
    class="map-btn"
  >
    Ver en Google Maps
  </a>

  <!-- IMAGEN -->

  <img
    src="foto2.png"
    alt="Imagen central"
    class="center-img"
  >
<!-- FECHA EVENTO -->

<div class="event-date">
  📅 26 de Mayo 2026 - 17:00 hs a 20:00hs
</div>
  
  <!-- CONTADOR -->

  <div class="countdown" id="countdown"></div>

</div>

<div class="moonwalk">
  🕺 ¡No faltes!
</div>

<script>

const eventDate =
new Date("2026-05-26T17:00:00").getTime();

const countdown =
document.getElementById("countdown");

setInterval(() => {

  const now = new Date().getTime();

  const distance = eventDate - now;

  const days =
    Math.floor(distance / (1000 * 60 * 60 * 24));

  const hours =
    Math.floor((distance %
    (1000 * 60 * 60 * 24))
    / (1000 * 60 * 60));

  const minutes =
    Math.floor((distance %
    (1000 * 60 * 60))
    / (1000 * 60));

  const seconds =
    Math.floor((distance %
    (1000 * 60))
    / 1000);

  countdown.innerHTML =
    `${days} días ${hours}h ${minutes}m ${seconds}s`;

  if(distance < 0){
    countdown.innerHTML =
    "🎉 ¡El evento comenzó! 🎉";
  }

},1000);

</script>

  <!-- BOTÓN WHATSAPP -->

<a
  href="https://wa.me/54920214841?text=Hola!%20Confirmo%20mi%20asistencia%20al%20cumple%20de%20Dante%20🎉"
  target="_blank"
  class="whatsapp-btn"
>
  ✅ Confirmar asistencia
</a>
  
<!-- MÚSICA -->

<audio id="music" autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- BOTÓN MÚSICA -->

<button class="music-btn" onclick="toggleMusic()">
  🎵 Música
</button>

<script>

const music =
document.getElementById("music");

function toggleMusic(){

  if(music.paused){
    music.play();
  }else{
    music.pause();
  }

}

</script>
<script>

document.body.addEventListener("click", () => {
  music.play();
}, { once:true });

</script>
</body>
</html>
