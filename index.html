<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Especial</title>
  <style>
    .center-img {
  width: 250px;
  max-width: 80%;
  margin: 20px 0;
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(255,255,255,0.6);
  transition: transform 0.3s ease;
}

.center-img:hover {
  transform: scale(1.05);
}
    body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.3;
}
    body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6); /* oscuridad */
  z-index: -1;
}
    
  body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
  text-align: center;
  overflow: hidden;
}
    .container {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 3em;
      letter-spacing: 2px;
      text-shadow: 0 0 20px #fff, 0 0 40px #00f;
    }

    .countdown {
      font-size: 2em;
      margin-top: 20px;
    }

    .glow {
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #fff, 0 0 20px #0ff;
      }
      to {
        text-shadow: 0 0 20px #fff, 0 0 40px #f0f;
      }
    }

    .moonwalk {
      position: absolute;
      bottom: 20px;
      width: 100%;
      font-size: 1.5em;
      animation: move 5s linear infinite;
    }

    @keyframes move {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

  </style>
</head>
<body>
  <p class="location">📍 Salón Luna - Viedma</p>
<a href="https://www.google.com/maps/place/Tercer+Tiempo+Kids/@-40.8097105,-63.0211314,17z/data=!3m1!4b1!4m6!3m5!1s0x95f6bd5605bc163f:0x9f6b0bb4dbaa94ed!8m2!3d-40.8097105!4d-63.0211314!16s%2Fg%2F11gfhdk7vz?entry=ttu&g_ep=EgoyMDI2MDUwMi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="map-btn">
  Ver en Google Maps
</a>
  <div class="container">
    <h1 class="glow">Estás Invitado</h1>
    <p>Cumpleaños dante</p>
    <!-- IMAGEN CENTRAL -->
  <img src="foto1.png" alt="Imagen central" class="center-img">

  <div class="countdown" id="countdown"></div>
    <div class="countdown" id="countdown"></div>
  </div>

  <div class="moonwalk">🕺¡No faltes!</div>

  <script>
    const eventDate = new Date("2026-05-26T17:00:00").getTime();

    const countdown = document.getElementById("countdown");

    setInterval(() => {
      const now = new Date().getTime();
      const distance = eventDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      countdown.innerHTML = `${days} días ${hours}h ${minutes}m ${seconds}s`;

      if (distance < 0) {
        countdown.innerHTML = "¡El evento comenzó!";
      }
    }, 1000);
  </script>
</body>
</html>
